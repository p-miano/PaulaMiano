<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paula Miano</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .title {
      font-size: 1rem;
      font-weight: 300;
      color: #aaa;
      margin-top: 6px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 18px 0;
    }

    .tag {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.78rem;
      color: #bbb;
    }

    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 10px 0 36px;
    }

    .links a {
      color: #6c63ff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .links a:hover { color: #3ecfcf; }

    .divider {
      border: none;
      border-top: 1px solid #222;
      margin-bottom: 32px;
    }

    h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 20px;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .project-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 18px 22px;
      text-align: left;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .project-card:hover {
      border-color: #6c63ff;
      transform: translateY(-2px);
    }

    .project-icon {
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .project-info h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .project-info p {
      font-size: 0.82rem;
      color: #888;
      line-height: 1.4;
    }

    .arrow {
      margin-left: auto;
      color: #444;
      font-size: 1.1rem;
    }

    footer {
      margin-top: 48px;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar"><img src="foto.jpg" style="width:90px;height:90px;border-radius:50%;object-fit:cover;"></div>

    <h1>Paula Miano</h1>
    <p class="title">Developer & Builder</p>

    <div class="tags">
      <span class="tag">Power Platform</span>
      <span class="tag">Data Analyst</span>
      <span class="tag">AI</span>
      <span class="tag">Real Estate</span>
      <span class="tag">Apps</span>
    </div>

    <div class="links">
      <a href="https://linkedin.com/in/paula-miano" target="_blank">LinkedIn</a>
      <a href="https://github.com/p-miano" target="_blank">GitHub</a>
      <a href="mailto:paulamiano@gmail.com">Email</a>
    </div>

    <hr class="divider"/>

    <h2>Projetos</h2>

    <div class="projects">

      <a href="/atletascomdorflex" class="project-card">
        <span class="project-icon">🏋️</span>
        <div class="project-info">
          <h3>Atletas com Dorflex</h3>
          <p>App de acompanhamento de treinos e competições. Desenvolvido com Lovable.</p>
        </div>
        <span class="arrow">→</span>
      </a>

      <!-- Adicione novos projetos aqui, copiando o bloco acima -->

    </div>

  </div>

  <footer>paulamiano.com</footer>
</body>
</html>
