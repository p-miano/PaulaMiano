name: Update GitHub Repo Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight (can be adjusted)
  workflow_dispatch: # Allows manual triggering

jobs:
  fetch-and-save-data:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Fetch the repository data from GitHub API
      - name: Fetch Repo Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -H "Authorization: token $GITHUB_TOKEN" \
          https://api.github.com/user/repos?type=all&per_page=100 \
          > repo_data.json

      # Step 5: Commit and push the repo data JSON file back to the repository
      - name: Commit and Push JSON File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo_data.json
          git commit -m "Update repository data [skip ci]"
          git push
