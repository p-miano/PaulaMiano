name: Update GitHub Repo Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight (can be adjusted)
  workflow_dispatch: # Allows manual triggering

jobs:
  fetch-and-save-data:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Fetch the repository data from GitHub API
      - name: Fetch Repo Data
        env:
          STATS_API_TOKEN: ${{ secrets.STATS_API_TOKEN }}
        run: |
          echo "Fetching repository data..."
          RESPONSE=$(curl -s -H "Authorization: token $STATS_API_TOKEN" \
            https://api.github.com/user/repos?type=all&per_page=100)

          # Verify if RESPONSE contains data and write it to the file
          if [ -n "$RESPONSE" ]; then
            echo "$RESPONSE" | jq '.' > repo_data.json
          else
            echo "No data fetched. RESPONSE is empty."
            exit 1
          fi

          # Output the content for verification
          echo "Fetched data saved to JSON file:"
          cat repo_data.json

      # Step 5: Checkout the `gh-pages` branch
      - name: Checkout gh-pages Branch
        run: |
          git fetch
          git checkout gh-pages

      # Step 6: Copy the updated JSON file to the correct location
      - name: Move JSON File to Public Directory
        run: mv repo_data.json public/repo_data.json

      # Step 7: Commit and push the updated JSON file to `gh-pages`
      - name: Commit and Push JSON File to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/repo_data.json
          git commit -m "Update repository data [skip ci]" || echo "No changes to commit"
          git push origin gh-pages
